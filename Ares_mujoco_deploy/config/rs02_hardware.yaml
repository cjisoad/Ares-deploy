# RS02 backend configuration for Ares 12-joint hardware.
# Dry-run is safe by default. Live output requires the demo's explicit --live
# confirmation and per-joint enabled=true settings below.

interface:
  port: /dev/ttyUSB0
  serial_baud: 921600
  master_id: 0xFD
  rate_hz: 100

safety:
  startup_timeout: 3.0
  feedback_timeout: 0.25
  command_timeout: 0.25
  default_damping_kd: 0.2

state:
  base_height: 0.0

dry_run:
  tracking_alpha: 0.2

joints:
  lf_hip_base_joint:
    motor_name: lf_hip
    motor_id: 0x01
    enabled: false
    sign: 1.0
    zero_offset: 0.0
    joint_min: -0.5
    joint_max: 1.57
    motor_min:
    motor_max:
  lf_thigh_hip_joint:
    motor_name: lf_thigh
    motor_id: 0x02
    enabled: false
    sign: 1.0
    zero_offset: 0.0
    joint_min: -2.35
    joint_max: 2.35
    motor_min:
    motor_max:
